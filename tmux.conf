# 'fix' colors
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse mode
set -g mouse on

# Let programs tunnel OSC escapes out to the real terminal (e.g. the mosh
# wrapper recoloring iTerm2's background). Without this tmux swallows them.
set -g allow-passthrough on

# add C-a as a prefix key
set-option -g prefix2 C-a

# Vim style pane selection
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Don't let programs / shell rename windows after I've named them
set-option -g allow-rename off
set-window-option -g automatic-rename off
# Give every new window a neutral fixed name so unnamed ones don't inherit the
# running command (and don't get resurrected as "zsh" by continuum/resurrect)
set-hook -g after-new-window 'rename-window "term"'

set -g @continuum-restore 'on'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'

set -g @plugin 'jaclu/tmux-menus'
set -g @menus_trigger 'F12'

# nvim-tree file explorer
set -g @treemux-tree-client 'neo-tree'
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

# Installed manually now...
# set -g @plugin 'catppuccin/tmux'

run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

#bind-key P paste-buffer
#bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g default-terminal "tmux-256color"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
# leave this unset to let applications set the window title
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_mauve}"


# Make the status line pretty and add some modules
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# allow OSC passthrough so remote shells can tint the terminal bg
set -g allow-passthrough on

# Nested-tmux passthrough: only bind the F12 OFF-toggle on the LOCAL machine
# (no $SSH_TTY). On a remote server this block is skipped so its own prefix
# stays live and F12 falls through to it instead of toggling both off.
if-shell -b '[ -z "$SSH_TTY" ]' {
  bind -T root F12 \
  set prefix None \;\
  set prefix2 None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

  bind -T off F12 \
  set -u prefix \;\
  set -u prefix2 \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S
}
